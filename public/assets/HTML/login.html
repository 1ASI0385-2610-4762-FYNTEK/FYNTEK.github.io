<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITALIS - Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/dashboard-style.css">


</head>
<body class="bg-zen-dark">

<div class="login-wrapper">
    <div class="login-card">
        <div class="text-center mb-32">
            <h1 class="login-title">Ingresar a VITALIS</h1>
            <p class="login-subtitle">Introduce tus datos de acceso habitual.</p>
        </div>

        <form id="form-login" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Nombre de Usuario o Correo</label>
                <input type="text" id="username" required placeholder="Ej. Jorge Martines" class="form-input">
            </div>

            <div class="form-group">
                <label>Selecciona tu Rol Obligatorio</label>
                <div class="role-login-grid">
                    <div class="role-login-box" id="role-student" onclick="selectLoginRole('estudiante')" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' ')selectLoginRole('estudiante')" role="button" aria-pressed="false">
                        <span class="role-icon-mini">🎓</span>
                        <div>
                            <h4>Estudiante</h4>
                            <small>Carga Académica</small>
                        </div>
                    </div>
                    <div class="role-login-box" id="role-intern" onclick="selectLoginRole('practicante')" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' ')selectLoginRole('practicante')" role="button" aria-pressed="false">
                        <span class="role-icon-mini">💼</span>
                        <div>
                            <h4>Practicante</h4>
                            <small>Pre-Profesional</small>
                        </div>
                    </div>
                </div>
            </div>

            <button type="submit" id="btn-submit-login" class="btn btn-login-submit btn-disabled" disabled>
                Ingresar al Espacio Zen
            </button>
        </form>
    </div>
</div>

<script>
    let selectedRole = null;

    function selectLoginRole(role) {
        selectedRole = role;
        const studentBox = document.getElementById('role-student');
        const internBox  = document.getElementById('role-intern');

        studentBox.classList.remove('active-role-box');
        internBox.classList.remove('active-role-box');
        studentBox.setAttribute('aria-pressed', 'false');
        internBox.setAttribute('aria-pressed', 'false');

        if (role === 'estudiante') {
            studentBox.classList.add('active-role-box');
            studentBox.setAttribute('aria-pressed', 'true');
        } else {
            internBox.classList.add('active-role-box');
            internBox.setAttribute('aria-pressed', 'true');
        }

        const submitBtn = document.getElementById('btn-submit-login');
        submitBtn.removeAttribute('disabled');
        submitBtn.classList.remove('btn-disabled');
    }

    function handleLogin(e) {
        e.preventDefault();
        const username = document.getElementById('username').value;

        // Guardamos en sessionStorage para personalizar el dashboard sin Base de Datos
        sessionStorage.setItem('vitalis_username', username);
        sessionStorage.setItem('vitalis_role', selectedRole);

        window.location.href = 'dashboard.html';
    }
</script>
</body>
</html>
